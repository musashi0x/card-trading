services:
  postgres:
    image: postgres:16-alpine
    container_name: cardmkt-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cardmkt
    ports:
      - '5432:5432'
    volumes:
      - cardmkt-pg:/var/lib/postgresql/data

  kubo:
    image: ipfs/kubo:latest
    container_name: cardmkt-kubo
    ports:
      # RPC API — the card API pins images here (IPFS_API_URL).
      - '5001:5001'
      # Gateway — serves pinned content for display (IPFS_GATEWAY_URL).
      - '8080:8080'
    volumes:
      - cardmkt-ipfs:/data/ipfs

volumes:
  cardmkt-pg:
  cardmkt-ipfs:
